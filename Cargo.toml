[package]
name         = "nexus"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/nexus"
description  = "Nexus — the text request language and its translator daemon. Parses nexus messages, forwards rkyv signal frames to criomed. Includes the grammar spec under spec/."

[lib]
name = "nexus"
path = "src/lib.rs"

[[bin]]
name = "nexus"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
thiserror = "2"
ractor = "0.15"
uuid = { version = "1", features = ["v7"] }
rkyv = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }

[lints.rust]
unused = "allow"
dead_code = "allow"
