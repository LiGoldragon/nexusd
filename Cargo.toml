[package]
name         = "nexusd"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/nexusd"
description  = "Nexus-text messenger — parses nexus messages, forwards rkyv criome-messages to criomed"

[lib]
name = "nexusd"
path = "src/lib.rs"

[[bin]]
name = "nexusd"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
thiserror = "2"
ractor = "0.15"
uuid = { version = "1", features = ["v7"] }
rkyv = { version = "0.8", default-features = false, features = ["std", "bytecheck", "little_endian", "pointer_width_32", "unaligned"] }

[lints.rust]
unused = "allow"
dead_code = "allow"
