[package]
name         = "nexusd"
version      = "0.1.0"
edition      = "2024"
rust-version = "1.85"
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/LiGoldragon/nexusd"
description  = "Nexus-text messenger — parses nexus messages, forwards rkyv criome-messages to criomed"

[dependencies]
clap = { version = "4", features = ["derive"] }
thiserror = "2"
ractor = "0.15"
